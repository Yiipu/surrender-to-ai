<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title data-i18n="title">Surrender to AI</title>
    <style>
        :root {
            --bg: #f7f7f7;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-contrast: #ffffff;
            --focus: rgba(37, 99, 235, .35);

            --radius: 12px;

            --space-1: 8px;
            --space-2: 12px;
            --space-3: 16px;
            --space-4: 24px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0f19;
                --card: #0f172a;
                --text: #e5e7eb;
                --muted: #94a3b8;
                --border: rgba(148, 163, 184, .25);
                --primary: #60a5fa;
                --primary-contrast: #0b1220;
                --focus: rgba(96, 165, 250, .35);
            }
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: system-ui, "Microsoft YaHei", sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
            padding: calc(clamp(16px, 3vw, 28px) + env(safe-area-inset-top))
                calc(clamp(16px, 3vw, 28px) + env(safe-area-inset-right))
                calc(clamp(16px, 3vw, 28px) + env(safe-area-inset-bottom))
                calc(clamp(16px, 3vw, 28px) + env(safe-area-inset-left));
        }

        .card {
            width: min(700px, 100%);
            margin: 0 auto;
            background: var(--card);
            padding: clamp(16px, 3vw, 24px);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-2);
            flex-wrap: wrap;
            margin-bottom: var(--space-3);
        }

        h1 {
            margin: 0;
            font-size: 1.35rem;
            line-height: 1.25;
            letter-spacing: -0.01em;
        }

        form {
            margin-top: var(--space-3);
        }

        .field {
            display: block;
            margin: 0 0 var(--space-3);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--space-1);
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            appearance: none;
            border: 1px solid var(--border);
            background: color-mix(in srgb, var(--card), var(--bg) 10%);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 16px;
            line-height: 1.3;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select {
            width: auto;
            min-width: 140px;
        }

        input[type="text"]:focus-visible,
        textarea:focus-visible,
        select:focus-visible,
        button:focus-visible,
        a:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 2px;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: color-mix(in srgb, var(--card), var(--bg) 10%);
            margin: 0 0 var(--space-3);
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 2px 0 0;
            flex: 0 0 auto;
        }

        .checkbox-row label {
            margin: 0;
            font-weight: 500;
            color: var(--text);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        button {
            border: 1px solid color-mix(in srgb, var(--primary), #000 10%);
            background: var(--primary);
            color: var(--primary-contrast);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: 650;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            transform: translateY(1px);
        }

        .downloads {
            margin-top: var(--space-3);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            align-items: center;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            background: color-mix(in srgb, var(--card), var(--bg) 12%);
            font-weight: 600;
        }

        .status {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                scroll-behavior: auto !important;
                transition: none !important;
                animation: none !important;
            }

            button:active {
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <h1 data-i18n="heading">Sign Your Surrender</h1>
            <select id="lang-switcher" aria-label="Language">
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <form id="surrenderForm">
            <div class="field">
                <label for="name" data-i18n="name_label">Your Name:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="field">
                <label for="note" data-i18n="note_label">Postscript (optional): </label>
                <textarea id="note" name="note"></textarea>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="agree" required>
                <label for="agree" data-i18n="agree_label"> I understand this is a public
                    record
                    (irreversible, auditable)</label>
            </div>

            <div class="actions">
                <button type="submit" data-i18n="submit" id="surrender">Submit</button>
            </div>
        </form>

        <div class="downloads">
            <a id="dlsig" class="download-link" style="display:none" data-i18n="dlsig">Download Your Signature</a>
            <a id="dlots" class="download-link" style="display:none" data-i18n="dlots">Download Your OTS</a>
            <p id="pending" class="status" style="display:none" data-i18n="pending">Submitting...</p>
        </div>

    </div>

    <script src="i18n.js"></script>
    <script>
        const dlots = document.getElementById('dlots');
        const dlsig = document.getElementById('dlsig');
        const pending = document.getElementById('pending');

        document.getElementById('surrenderForm').addEventListener('submit', async e => {
            e.preventDefault();
            const sign = {
                type: 'surrender-to-ai',
                name: document.getElementById('name').value.slice(0, 200).trim(),
                note: document.getElementById('note').value.slice(0, 2000).trim(),
                timestamp: new Date().toISOString()
            };
            const content = JSON.stringify(sign, null, 2);

            // 计算 SHA-256 哈希
            const sha256 = await computeSHA256(content);
            const filename = `${sign.timestamp.replace(/[:.]/g, '-')}-${sha256.slice(0, 10)}.json`;
            const b64 = btoa(toBinaryStr(content)); // 使用 btoa 编码 Base64

            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            dlsig.href = url;
            dlsig.download = filename;
            dlsig.style.display = 'inline-flex';

            pending.style.display = 'block';
            try {
                const r = await fetch('/.netlify/functions/sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, sha256 })
                });
                const j = await r.json();

                // 错误
                if (r.status === 400) {
                    pending.textContent = `${t?.('rt_submission_failed', 'Submission failed:')} ${j.message}`;
                    return;
                }

                // 成功或部分成功
                if (r.status === 200 || r.status === 202) {
                    let otsUrl;

                    if (r.status === 202) {
                        const asciiString = j.otsFile;
                        const byteArray = new Uint8Array(asciiString.split(',').map(num => parseInt(num, 10)));
                        const otsBlob = new Blob([byteArray], { type: 'application/octet-stream' });

                        otsUrl = URL.createObjectURL(otsBlob);
                    } else {
                        otsUrl = j.ots_url;
                    }

                    // 设置下载链接
                    dlots.href = otsUrl;
                    dlots.download = filename + '.ots';
                    dlots.style.display = 'inline-flex';

                    // 更新提示信息
                    pending.textContent = r.status === 200
                        ? `${t?.('rt_ots_uploaded', 'OTS created and uploaded to')} ${j.ots_url}`
                        : t?.('rt_ots_not_uploaded', 'OTS created and not uploaded, please download and upgrade it manually');

                    return;
                }

                throw new Error(t?.('rt_unexpected_response', 'Unexpected response from server') ?? 'Unexpected response from server');
            } catch (err) {
                pending.style.display = 'block';
                pending.textContent = err.message;
            }
        });

        function toBinaryStr(str) {
            const encoder = new TextEncoder();
            const charCodes = encoder.encode(str);
            return String.fromCharCode(...charCodes);
        }

        // 计算 SHA-256 哈希的函数
        async function computeSHA256(content) {
            const encoder = new TextEncoder();
            const data = encoder.encode(content);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = new Uint8Array(hashBuffer);
            return Array.from(hashArray).map(byte => byte.toString(16).padStart(2, '0')).join('');
        }
    </script>
</body>

</html>
